- hosts: localhost
  tasks:
    - name: Pull Docker Image
      command: docker pull shrey1112/spe-mini-project

    - name: Stop any running container of this image
      shell: docker ps -q --filter ancestor=shrey1112/spe-mini-project | xargs -r docker stop

    - name: Remove stopped container
      shell: docker ps -aq --filter ancestor=shrey1112/spe-mini-project | xargs -r docker rm

    - name: Run Docker Container
      command: docker run -d -p 5000:5000 --name spe-calculator shrey1112/spe-mini-project