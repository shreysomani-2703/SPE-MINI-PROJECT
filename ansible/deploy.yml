- hosts: localhost
  connection: local
  become: false

  tasks:
    - name: Pull Docker Image
      command: docker pull shrey1112/spe-mini-project

    - name: Remove existing container
      command: docker rm -f spe-calculator
      ignore_errors: yes

    - name: Run Docker Container
      command: docker run -dit --name spe-calculator shrey1112/spe-mini-project